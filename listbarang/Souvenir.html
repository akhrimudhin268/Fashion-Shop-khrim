<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>MarketShopp</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 5px;
    }

    button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #e65c00;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #ddd;
    }
  </style>

</head>
<body>

<header>
  <h1>🛍️ MarketShopp</h1>
</header>

<main class="products">

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Barang 1">
    <h3>Kaos Polos</h3>
    <p>Rp 75.000</p>
    <button>Beli</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Barang 2">
    <h3>Sepatu Sneakers</h3>
    <p>Rp 350.000</p>
    <button>Beli</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Barang 3">
    <h3>Tas Ransel</h3>
    <p>Rp 250.000</p>
    <button>Beli</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Barang 4">
    <h3>Jam Tangan</h3>
    <p>Rp 180.000</p>
    <button>Beli</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Barang 5">
    <h3>Topi Baseball</h3>
    <p>Rp 60.000</p>
    <button>Beli</button>
  </div>

</main>

<footer>
  <p>© 2026 MarketShopp</p>
</footer>

</body>
</html>
