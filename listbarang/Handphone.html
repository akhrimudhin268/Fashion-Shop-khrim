<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>MarketShopp</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    header p {
      margin: 5px;
      font-size: 14px;
      color: #ccc;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .product:hover {
      transform: translateY(-6px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .product img {
      width: 100%;
      border-radius: 6px;
    }

    .rating {
      color: gold;
      font-size: 18px;
      margin-top: 5px;
    }

    .rating span {
      color: #555;
      font-size: 14px;
      margin-left: 5px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #ff6600;
      margin: 8px 0;
    }

    button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    button:hover {
      background: #e65c00;
    }

    footer {
      text-align: center;
      padding: 12px;
      background: #ddd;
      margin-top: 20px;
    }
  </style>

</head>
<body>

<header>
  <h1>🛍️ MarketShopp</h1>
  <p>Toko Gadget Terpercaya</p>
</header>

<main class="products">

  <div class="product">
    <img src="foto/tablet.JPG" alt="Tablet Huawei">
    <h3>Tablet Huawei</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(132 rating)</span></div>
    <div class="price">Rp 5.800.000</div>
    <button onclick="beli('Tablet Huawei')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/ip.JPG" alt="iPhone">
    <h3>iPhone</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(420 rating)</span></div>
    <div class="price">Rp 25.000.000</div>
    <button onclick="beli('iPhone')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/samsung.JPG" alt="Samsung">
    <h3>Samsung</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(289 rating)</span></div>
    <div class="price">Rp 18.000.000</div>
    <button onclick="beli('Samsung')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/vivo.JPG" alt="Vivo">
    <h3>Vivo</h3>
    <div class="rating">⭐⭐⭐⭐☆ <span>(97 rating)</span></div>
    <div class="price">Rp 3.999.000</div>
    <button onclick="beli('Vivo')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/oppo.JPG" alt="Oppo">
    <h3>Oppo</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(156 rating)</span></div>
    <div class="price">Rp 12.999.000</div>
    <button onclick="beli('Oppo')">Beli</button>
  </div>

</main>

<footer>
  <p>© 2026 MarketShopp | khrim_MarketShopp</p>
</footer>

<script>
  function beli(namaBarang) {
    let konfirmasi = confirm("Apakah Anda ingin membeli " + namaBarang + "?");

    if (konfirmasi) {
      alert("✅ Terima kasih telah membeli: " + namaBarang);
    }
  }
</script>

</body>
</html>
