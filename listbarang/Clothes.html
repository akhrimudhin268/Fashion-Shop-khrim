<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>MarketShopp</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

      header p {
      margin: 5px;
      font-size: 14px;
      color: #ccc;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

     .product:hover {
      transform: translateY(-6px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    
    .product img {
      width: 100%;
      border-radius: 5px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #e65c00;
      margin: 5px 0;
    }

    .rating {
      color: gold;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .rating span {
      color: #555;
      font-size: 14px;
      margin-left: 5px;
    }

    button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #e65c00;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #ddd;
    }
  </style>

</head>
<body>

<header>
  <h1>🛍️ MarketShopp</h1>
</header>

<main class="products">

  <div class="product">
    <img src="foto/kaos.JPG">
    <h3>Kaos Anak</h3>
    <div class="rating">⭐⭐⭐⭐☆ <span>(120 rating)</span></div>
    <div class="price">Rp 75.000</div>
    <button onclick="beli('Kaos Anak')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/celana.JPG">
    <h3>Celana Cargo</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(89 rating)</span></div>
    <div class="price">Rp 350.000</div>
    <button onclick="beli('Celana Cargo')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/kemeja.WEBP">
    <h3>Kemeja Pria</h3>
    <div class="rating">⭐⭐⭐⭐☆ <span>(64 rating)</span></div>
    <div class="price">Rp 250.000</div>
    <button onclick="beli('Kemeja Pria')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/polo.JPG">
    <h3>Kaos Polo</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(210 rating)</span></div>
    <div class="price">Rp 180.000</div>
    <button onclick="beli('Kaos Polo')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/hodie.JPG">
    <h3>Hodie</h3>
    <div class="rating">⭐⭐⭐⭐☆ <span>(95 rating)</span></div>
    <div class="price">Rp 360.000</div>
    <button onclick="beli('Hodie')">Beli</button>
  </div>

</main>

<footer>
  <p>khrim_MarketShopp</p>
</footer>

<script>
function beli(namaBarang){
  alert("Terima kasih telah membeli: " + namaBarang);
}
</script>

</body>
</html>
