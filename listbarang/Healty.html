<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>MarketShopp</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    header p {
      margin: 5px;
      font-size: 14px;
      color: #ccc;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .product:hover {
      transform: translateY(-6px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .product img {
      width: 100%;
      border-radius: 6px;
    }

    .rating {
      color: gold;
      font-size: 18px;
      margin-top: 5px;
    }

    .rating span {
      color: #555;
      font-size: 14px;
      margin-left: 5px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #ff6600;
      margin: 8px 0;
    }

    button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    button:hover {
      background: #e65c00;
    }

    footer {
      text-align: center;
      padding: 12px;
      background: #ddd;
      margin-top: 20px;
    }
  </style>

</head>
<body>

<header>
  <h1>🛍️ MarketShopp</h1>
  <p>Toko Perlengkapan Kesehatan</p>
</header>

<main class="products">

  <div class="product">
    <img src="foto/alkohol.JPG" alt="Alkohol">
    <h3>Alkohol</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(167 rating)</span></div>
    <div class="price">Rp 50.000</div>
    <button onclick="beli('Alkohol')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/betadine.JPG" alt="Betadine">
    <h3>Betadine</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(203 rating)</span></div>
    <div class="price">Rp 20.000</div>
    <button onclick="beli('Betadine')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/hansaplast.JPG" alt="Hansaplast">
    <h3>Hansaplast</h3>
    <div class="rating">⭐⭐⭐⭐☆ <span>(98 rating)</span></div>
    <div class="price">Rp 20.000</div>
    <button onclick="beli('Hansaplast')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/kasa.JPG" alt="Kasa">
    <h3>Kasa</h3>
    <div class="rating">⭐⭐⭐⭐☆ <span>(76 rating)</span></div>
    <div class="price">Rp 15.000</div>
    <button onclick="beli('Kasa')">Beli</button>
  </div>

  <div class="product">
    <img src="foto/revanol.JPG" alt="Revanol">
    <h3>Revanol</h3>
    <div class="rating">⭐⭐⭐⭐⭐ <span>(154 rating)</span></div>
    <div class="price">Rp 50.000</div>
    <button onclick="beli('Revanol')">Beli</button>
  </div>

</main>

<footer>
  <p>© 2026 MarketShopp | khrim_MarketShopp</p>
</footer>

<script>
  function beli(namaBarang) {
    let konfirmasi = confirm("Apakah Anda ingin membeli " + namaBarang + "?");

    if (konfirmasi) {
      alert("✅ Terima kasih telah membeli: " + namaBarang);
    }
  }
</script>

</body>
</html>
